<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-src https://accounts.google.com; frame-ancestors 'none';" />
  <title>My Hearthlane Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --terra:      #c08568;
      --terra-soft: #f0d8c8;
      --terra-deep: #8a5a40;
      --cream:      #f7efe2;
      --cream-soft: #fbf6ec;
      --cream-dark: #ede0c8;
      --ink:        #3a2e22;
      --ink-mid:    #6b5a48;
      --ink-light:  #98876d;
      --sage:       #7a8b6f;
      --sage-soft:  #d5dcc9;
      --white:      #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: 'DM Sans', system-ui, sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }

    /* ── LOGIN ── */
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--cream); }
    .login-card { background: var(--white); border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(58,46,34,0.12); }
    .login-logo { font-size: 1.7rem; font-weight: 700; color: var(--ink); margin-bottom: 0.15rem; }
    .login-logo span { color: var(--terra); }
    .login-sub { font-size: 0.88rem; color: var(--ink-light); margin-bottom: 2rem; }
    .btn-google { width: 100%; padding: 0.85rem; background: var(--white); color: var(--ink); border: 2px solid var(--cream-dark); border-radius: 10px; font-size: 0.95rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.6rem; transition: border-color 0.2s, box-shadow 0.2s; }
    .btn-google:hover { border-color: var(--terra); box-shadow: 0 2px 12px rgba(192,133,104,0.15); }
    .login-error { color: #c44; font-size: 0.85rem; margin-top: 0.85rem; display: none; line-height: 1.5; }

    /* ── APP ── */
    #app { display: none; min-height: 100vh; flex-direction: column; }

    /* ── TOP NAV ── */
    .topnav { height: 60px; background: var(--ink); display: flex; align-items: center; justify-content: space-between; padding: 0 1.75rem; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 1.15rem; font-weight: 700; color: var(--white); }
    .nav-logo span { color: var(--terra); }
    .nav-right { display: flex; align-items: center; gap: 0.85rem; }
    .nav-name { color: rgba(255,255,255,0.75); font-size: 0.88rem; }
    .btn-signout { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.65); border: none; padding: 0.4rem 0.9rem; border-radius: 100px; font-size: 0.8rem; transition: all 0.15s; }
    .btn-signout:hover { background: rgba(255,255,255,0.18); color: var(--white); }

    /* ── TAB NAV ── */
    .tabnav { background: var(--white); border-bottom: 1.5px solid var(--cream-dark); display: flex; padding: 0 1.75rem; overflow-x: auto; }
    .tab-btn { padding: 0.9rem 1.25rem; font-size: 0.88rem; font-weight: 500; color: var(--ink-light); background: none; border: none; border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; transition: all 0.15s; white-space: nowrap; }
    .tab-btn:hover { color: var(--terra); }
    .tab-btn.active { color: var(--terra); border-bottom-color: var(--terra); }

    /* ── MAIN ── */
    .main { flex: 1; padding: 1.75rem; max-width: 860px; width: 100%; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    .view-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.25rem; }
    .view-sub { font-size: 0.86rem; color: var(--ink-light); margin-bottom: 1.75rem; }

    /* ── CARDS ── */
    .card { background: var(--white); border-radius: 14px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(58,46,34,0.06); margin-bottom: 1.25rem; }
    .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 1.1rem; }

    /* ── NEXT VISIT ── */
    .next-visit-card { background: var(--ink); color: var(--white); border-radius: 12px; padding: 1.5rem; }
    .nv-label { font-size: 0.78rem; color: rgba(255,255,255,0.55); margin-bottom: 0.2rem; }
    .nv-date { font-size: 1rem; font-weight: 600; }
    .nv-time { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .nv-cg { font-size: 0.95rem; font-weight: 500; color: var(--terra-soft); }
    .nv-address { font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-top: 0.35rem; }

    /* ── VISIT LIST ── */
    .visit-item { display: flex; align-items: flex-start; gap: 1rem; padding: 0.9rem 1.1rem; background: var(--cream-soft); border-radius: 10px; margin-bottom: 0.65rem; }
    .visit-item:last-child { margin-bottom: 0; }
    .visit-date { text-align: center; min-width: 44px; }
    .visit-day { font-size: 1.4rem; font-weight: 700; color: var(--terra); line-height: 1; }
    .visit-mon { font-size: 0.68rem; text-transform: uppercase; color: var(--ink-light); margin-top: 0.1rem; }
    .visit-info { flex: 1; }
    .visit-cg { font-weight: 600; font-size: 0.92rem; }
    .visit-meta { font-size: 0.8rem; color: var(--ink-light); margin-top: 0.2rem; }
    .visit-badge { padding: 0.22rem 0.6rem; border-radius: 100px; font-size: 0.72rem; font-weight: 600; background: #F59E0B; color: var(--white); flex-shrink: 0; }
    .visit-badge.confirmed { background: #EF4444; }
    .visit-badge.completed { background: var(--sage); }

    /* ── DASH PLAN BANNER ── */
    .dash-plan-banner { border-radius: 14px; padding: 1.25rem 1.5rem; background: linear-gradient(135deg, var(--ink) 0%, #5a3e2b 100%); color: var(--white); margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .dash-plan-left { display: flex; flex-direction: column; gap: 0.2rem; }
    .dash-plan-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); }
    .dash-plan-name { font-size: 1.2rem; font-weight: 700; color: var(--terra-soft); text-transform: capitalize; }
    .dash-plan-hint { font-size: 0.78rem; color: rgba(255,255,255,0.55); }

    /* ── PLAN PAGE ── */
    .plan-card { border-radius: 16px; padding: 2rem; background: linear-gradient(135deg, var(--ink) 0%, #5a3e2b 100%); color: var(--white); margin-bottom: 1.25rem; }
    .plan-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.55); margin-bottom: 0.4rem; }
    .plan-name { font-size: 2rem; font-weight: 700; color: var(--terra-soft); text-transform: capitalize; }
    .plan-features { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .plan-feat { font-size: 0.88rem; color: rgba(255,255,255,0.75); display: flex; align-items: center; gap: 0.5rem; }
    .plan-feat::before { content: '✓'; color: var(--terra-soft); font-weight: 700; flex-shrink: 0; }
    .btn-pay { display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem; padding: 0.75rem 1.75rem; background: var(--terra); color: var(--white); border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn-pay:hover { background: #a87050; }
    .plan-no { color: var(--ink-light); font-style: italic; }

    /* ── NOTES ── */
    .note-item { background: var(--cream-soft); border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 0.75rem; }
    .note-item:last-child { margin-bottom: 0; }
    .note-cg { font-weight: 600; font-size: 0.88rem; color: var(--terra-deep); }
    .note-date { font-size: 0.75rem; color: var(--ink-light); margin-top: 0.1rem; }
    .note-body { font-size: 0.9rem; color: var(--ink); margin-top: 0.5rem; line-height: 1.7; }

    /* ── EMPTY ── */
    .empty-state { color: var(--ink-light); font-size: 0.9rem; padding: 1rem 0; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 1.75rem; right: 1.75rem; background: var(--ink); color: var(--white); padding: 0.75rem 1.25rem; border-radius: 10px; font-size: 0.86rem; z-index: 9999; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.err { background: #c44; }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Hearthl<span>ane</span></div>
    <div class="login-sub">Client Portal — sign in with your Google account</div>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.3 33.6 29.7 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.4-6.4C34.2 5.5 29.4 3.5 24 3.5 12.7 3.5 3.5 12.7 3.5 24S12.7 44.5 24 44.5c11 0 20.5-8 20.5-20.5 0-1.4-.1-2.7-.5-4z"/></svg>
      Continue with Google
    </button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <nav class="topnav">
    <div class="nav-logo">Hearthl<span>ane</span></div>
    <div class="nav-right">
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-signout" onclick="handleSignOut()">Sign Out</button>
    </div>
  </nav>

  <div class="tabnav">
    <button class="tab-btn active" data-view="dashboard" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" data-view="plan" onclick="switchTab('plan')">My Plan</button>
    <button class="tab-btn" data-view="notes" onclick="switchTab('notes')">Notes from Caregiver</button>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="view-title" id="dash-greeting">Welcome back</div>
      <div class="view-sub">Here's your care at a glance</div>

      <!-- Plan + Payment banner — always visible on dashboard -->
      <div id="dash-plan-banner"></div>

      <div class="card">
        <div class="card-title">Next Visit</div>
        <div id="next-visit"><div class="empty-state">Loading…</div></div>
      </div>

      <div class="card">
        <div class="card-title">Upcoming Visits</div>
        <div id="upcoming-visits"><div class="empty-state">Loading…</div></div>
      </div>
    </div>

    <!-- MY PLAN -->
    <div class="view" id="view-plan">
      <div class="view-title">My Plan</div>
      <div class="view-sub">Your current Hearthlane care package</div>
      <div id="plan-content"><div class="empty-state">Loading…</div></div>
    </div>

    <!-- NOTES FROM CAREGIVER -->
    <div class="view" id="view-notes">
      <div class="view-title">Notes from Your Caregiver</div>
      <div class="view-sub">Updates and messages left after your visits</div>
      <div id="notes-list"><div class="empty-state">Loading…</div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDIofGQftDq5E1uo0twpEf4Ss7t8WOXyc4",
    authDomain: "local-stage-94f88.firebaseapp.com",
    projectId: "local-stage-94f88",
    storageBucket: "local-stage-94f88.firebasestorage.app",
    messagingSenderId: "177600603494",
    appId: "1:177600603494:web:1696f09bb3e51d075ad4a7"
  };
  firebase.initializeApp(firebaseConfig);
  const db   = firebase.firestore();
  const auth = firebase.auth();

  let clientDoc       = null;
  let caregiverDoc    = null;
  let stripeLinks     = {};   // { essential, companion, premium } — from settings/stripe
  let allAppointments = [];
  let _unsubAppts     = null;
  let _unsubClient    = null;

  // ── AUTH ────────────────────────────────────────────────────────────────────
  auth.onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      return;
    }
    try {
      await bootPortal(user);
    } catch(ex) {
      console.error('Auth state boot error:', ex);
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      const err = document.getElementById('login-error');
      err.textContent = 'Something went wrong loading your portal. Please refresh.';
      err.style.display = 'block';
    }
  });

  async function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await auth.signInWithPopup(provider);
    } catch(ex) {
      const err = document.getElementById('login-error');
      err.textContent = ex.message; err.style.display = 'block';
    }
  }

  function handleSignOut() {
    if (_unsubAppts)  { _unsubAppts();  _unsubAppts  = null; }
    if (_unsubClient) { _unsubClient(); _unsubClient = null; }
    auth.signOut();
  }

  // ── BOOT ────────────────────────────────────────────────────────────────────
  async function bootPortal(user) {
    const email = user.email?.toLowerCase();
    const errEl = document.getElementById('login-error');

    try {
      // 1. Check authorization
      const authSnap = await db.collection('authorizedUsers').doc(email).get();
      if (!authSnap.exists) {
        errEl.textContent = 'Access not granted. Please contact your care coordinator.';
        errEl.style.display = 'block';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        await auth.signOut();
        return;
      }

      // 2. Load client record
      const clientId   = authSnap.data().client_id;
      const clientSnap = await db.collection('clients').doc(clientId).get();
      if (!clientSnap.exists) {
        errEl.textContent = 'Client record not found. Contact your coordinator.';
        errEl.style.display = 'block';
        await auth.signOut();
        return;
      }
      clientDoc = { id: clientSnap.id, ...clientSnap.data() };

      // 3. Load caregiver (optional — don't fail if missing)
      if (clientDoc.caregiver_id) {
        try {
          const cgSnap = await db.collection('caregivers').doc(clientDoc.caregiver_id).get();
          if (cgSnap.exists) caregiverDoc = { id: cgSnap.id, ...cgSnap.data() };
        } catch(e) { console.warn('Could not load caregiver:', e); }
      }

      // 4. Load Stripe plan links (optional — don't fail if missing)
      try {
        const stripeSnap = await db.collection('settings').doc('stripe').get();
        if (stripeSnap.exists) stripeLinks = stripeSnap.data();
      } catch(e) { console.warn('Could not load Stripe settings:', e); }

      // 5. Show app
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display         = 'flex';
      document.getElementById('app').style.flexDirection   = 'column';
      document.getElementById('nav-name').textContent      = (clientDoc.name || 'Client').split(' ')[0];
      document.getElementById('dash-greeting').textContent = 'Welcome, ' + (clientDoc.name?.split(' ')[0] || 'there') + ' 👋';

      // 6. Real-time appointments listener
      _unsubAppts = db.collection('appointments')
        .where('client_id', '==', clientDoc.id)
        .onSnapshot(snap => {
          allAppointments = snap.docs.map(d => ({
            id: d.id, ...d.data(), scheduled_at: d.data().scheduled_at?.toDate()
          })).filter(a => a.status !== 'cancelled' && a.scheduled_at)
            .sort((a, b) => a.scheduled_at - b.scheduled_at);
          if (activeTab() === 'dashboard') renderDashboard();
        }, err => console.warn('Appointments listener error:', err));

      // 7. Real-time client doc listener (plan / stripe / caregiver updates from admin)
      _unsubClient = db.collection('clients').doc(clientDoc.id)
        .onSnapshot(snap => {
          if (!snap.exists) return;
          clientDoc = { id: snap.id, ...snap.data() };
          if (activeTab() === 'plan')      renderPlan();
          if (activeTab() === 'dashboard') renderDashboard();
          // Reload caregiver if it changed
          if (clientDoc.caregiver_id && clientDoc.caregiver_id !== caregiverDoc?.id) {
            db.collection('caregivers').doc(clientDoc.caregiver_id).get()
              .then(s => { if (s.exists) { caregiverDoc = { id: s.id, ...s.data() }; renderDashboard(); renderPlan(); }})
              .catch(() => {});
          }
          // Reload stripe links if plan changed
          db.collection('settings').doc('stripe').get()
            .then(s => { if (s.exists) { stripeLinks = s.data(); if (activeTab() === 'plan') renderPlan(); if (activeTab() === 'dashboard') renderDashboard(); }})
            .catch(() => {});
        }, err => console.warn('Client listener error:', err));

      switchTab('dashboard');

    } catch(ex) {
      errEl.textContent = 'Error loading portal: ' + ex.message;
      errEl.style.display = 'block';
      console.error('bootPortal error:', ex);
    }
  }

  // ── TAB SWITCHING ───────────────────────────────────────────────────────────
  function switchTab(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-view="${view}"]`).classList.add('active');
    if (view === 'dashboard') renderDashboard();
    if (view === 'plan')      renderPlan();
    if (view === 'notes')     loadNotes();
  }

  function activeTab() {
    return document.querySelector('.tab-btn.active')?.dataset.view || 'dashboard';
  }

  // ── DASHBOARD ───────────────────────────────────────────────────────────────
  function renderDashboard() {
    const now = new Date();
    const upcoming = allAppointments.filter(a => a.scheduled_at >= now);

    // Plan + payment banner
    const bannerEl = document.getElementById('dash-plan-banner');
    if (bannerEl) {
      const plan = clientDoc?.plan;
      const link = (plan && stripeLinks[plan]) || clientDoc?.stripe_link || null;
      if (plan || link) {
        bannerEl.innerHTML = `<div class="dash-plan-banner">
          <div class="dash-plan-left">
            ${plan ? `<div class="dash-plan-tag">Current Plan</div><div class="dash-plan-name">${plan}</div>` : ''}
            ${link ? `<div class="dash-plan-hint">Click Pay Now to manage your subscription</div>` : ''}
          </div>
          ${safeUrl(link) ? `<a class="btn-pay" href="${esc(safeUrl(link))}" target="_blank" rel="noopener noreferrer">💳 Pay Now</a>` : ''}
        </div>`;
      } else {
        bannerEl.innerHTML = '';
      }
    }

    // Next visit
    const nextEl = document.getElementById('next-visit');
    if (!upcoming.length) {
      nextEl.innerHTML = '<div class="empty-state">No upcoming visits scheduled.</div>';
    } else {
      const a = upcoming[0];
      const cgName = caregiverDoc?.name || 'Your Caregiver';
      nextEl.innerHTML = `<div class="next-visit-card">
        <div class="nv-label">Next Visit</div>
        <div class="nv-date">${a.scheduled_at.toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'})}</div>
        <div class="nv-time">${fmt12(a.scheduled_at)} · ${a.duration_minutes/60}h</div>
        <div class="nv-cg">${esc(cgName)}</div>
        ${clientDoc?.address ? `<div class="nv-address">${esc(clientDoc.address)}</div>` : ''}
      </div>`;
    }

    // Upcoming list
    const upEl = document.getElementById('upcoming-visits');
    const list  = upcoming.slice(0, 8);
    if (!list.length) {
      upEl.innerHTML = '<div class="empty-state">No upcoming visits.</div>';
    } else {
      upEl.innerHTML = list.map(a => {
        const badgeCls = a.status === 'confirmed' ? 'confirmed' : a.status === 'completed' ? 'completed' : '';
        const badgeTxt = a.status === 'confirmed' ? 'Confirmed' : a.status === 'completed' ? 'Completed' : 'Scheduled';
        return `<div class="visit-item">
          <div class="visit-date">
            <div class="visit-day">${a.scheduled_at.getDate()}</div>
            <div class="visit-mon">${a.scheduled_at.toLocaleDateString('en',{month:'short'})}</div>
          </div>
          <div class="visit-info">
            <div class="visit-cg">${esc(caregiverDoc?.name || 'Caregiver')}</div>
            <div class="visit-meta">${a.scheduled_at.toLocaleDateString('en',{weekday:'long'})} · ${fmt12(a.scheduled_at)} · ${a.duration_minutes/60}h</div>
          </div>
          <span class="visit-badge ${badgeCls}">${badgeTxt}</span>
        </div>`;
      }).join('');
    }
  }

  // ── PLAN ────────────────────────────────────────────────────────────────────
  const PLAN_FEATURES = {
    essential:  ['Weekly check-in visits', 'Dedicated caregiver', 'Coordinator support'],
    companion:  ['2–3 visits per week', 'Dedicated caregiver', 'Priority scheduling', 'Coordinator support'],
    premium:    ['Daily visits available', 'Dedicated caregiver', 'Priority scheduling', '24/7 coordinator line', 'Monthly care reviews']
  };

  function renderPlan() {
    const el   = document.getElementById('plan-content');
    const plan = clientDoc?.plan;

    if (!plan) {
      el.innerHTML = `<div class="card" style="text-align:center;padding:2.5rem">
        <div style="font-size:2.5rem;margin-bottom:0.75rem">📋</div>
        <p style="font-weight:600;margin-bottom:0.4rem">No plan assigned yet</p>
        <p class="plan-no">Your coordinator will assign your care plan shortly.</p>
      </div>`;
      return;
    }

    const planLabel = plan.charAt(0).toUpperCase() + plan.slice(1);
    const feats     = (PLAN_FEATURES[plan] || []).map(f => `<div class="plan-feat">${f}</div>`).join('');
    const payUrl    = stripeLinks[plan] || clientDoc?.stripe_link || null;

    el.innerHTML = `
      <div class="plan-card">
        <div class="plan-label">Your Current Plan</div>
        <div class="plan-name">${planLabel}</div>
        <div class="plan-features">${feats}</div>
        ${safeUrl(payUrl) ? `<a class="btn-pay" href="${esc(safeUrl(payUrl))}" target="_blank" rel="noopener noreferrer">💳 Pay Now</a>` : ''}
      </div>

      ${caregiverDoc ? `
      <div class="card">
        <div class="card-title">Your Caregiver</div>
        <div style="display:flex;align-items:center;gap:1rem">
          <div style="width:48px;height:48px;border-radius:50%;background:var(--terra);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;flex-shrink:0">
            ${(caregiverDoc.name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}
          </div>
          <div>
            <div style="font-weight:600;font-size:1rem">${esc(caregiverDoc.name)}</div>
            ${caregiverDoc.languages ? `<div style="font-size:0.82rem;color:var(--ink-mid);margin-top:0.2rem">Speaks: ${esc(caregiverDoc.languages)}</div>` : ''}
          </div>
        </div>
        ${caregiverDoc.bio ? `<p style="font-size:0.85rem;color:var(--ink-mid);margin-top:1rem;line-height:1.7">${esc(caregiverDoc.bio)}</p>` : ''}
      </div>` : ''}

      ${!payUrl ? `<div class="card" style="border:1.5px dashed var(--cream-dark)">
        <p style="font-size:0.85rem;color:var(--ink-light);text-align:center">Payment link not set up yet — your coordinator will add it shortly.</p>
      </div>` : ''}
    `;
  }

  // ── NOTES FROM CAREGIVER ───────────────────────────────────────────────────
  async function loadNotes() {
    const el = document.getElementById('notes-list');
    el.innerHTML = '<div class="empty-state">Loading…</div>';
    try {
      const snap = await db.collection('visit_notes')
        .where('client_id', '==', clientDoc.id).get();
      const allNotes = snap.docs.map(d => d.data())
        .sort((a, b) => (b.created_at?.seconds || 0) - (a.created_at?.seconds || 0)).slice(0, 30);
      if (!allNotes.length) {
        el.innerHTML = `<div style="text-align:center;padding:2.5rem">
          <div style="font-size:2.5rem;margin-bottom:0.75rem">💬</div>
          <p style="font-weight:600;margin-bottom:0.4rem">No notes yet</p>
          <p class="plan-no">Your caregiver will leave visit updates here.</p>
        </div>`;
        return;
      }
      el.innerHTML = allNotes.map(n => {
        const dt = n.created_at?.toDate?.();
        return `<div class="note-item">
          <div class="note-cg">${esc(caregiverDoc?.name || 'Your caregiver')}</div>
          <div class="note-date">${dt ? dt.toLocaleDateString('en',{weekday:'short',month:'long',day:'numeric',year:'numeric'}) + ' at ' + dt.toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'}) : '—'}</div>
          <div class="note-body">${esc(n.text)}</div>
        </div>`;
      }).join('');
    } catch(ex) {
      el.innerHTML = '<div class="empty-state">Could not load notes. Please refresh the page.</div>';
      console.error('loadNotes error:', ex);
    }
  }

  // ── UTILITIES ───────────────────────────────────────────────────────────────
  function fmt12(dt) {
    let h = dt.getHours(), m = dt.getMinutes();
    const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    return `${h}:${String(m).padStart(2,'0')} ${ap}`;
  }
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function safeUrl(url) {
    if (!url) return null;
    try {
      const u = new URL(url);
      if (u.protocol !== 'https:') return null;
      const allowed = ['buy.stripe.com','stripe.com','checkout.stripe.com'];
      if (!allowed.some(d => u.hostname === d || u.hostname.endsWith('.' + d))) return null;
      return url;
    } catch { return null; }
  }
  let _tt;
  function toast(msg, isErr = false) {
    const el = document.getElementById('toast'); el.textContent = msg;
    el.className = 'show' + (isErr ? ' err' : ''); clearTimeout(_tt);
    _tt = setTimeout(() => el.className = '', 3500);
  }
</script>
</body>
</html>
